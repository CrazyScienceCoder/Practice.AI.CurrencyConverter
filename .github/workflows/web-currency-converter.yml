name: Web · Currency Converter

on:
  pull_request:
    branches: [develop, main]
    paths:
      - 'Practice.Web.CurrencyConverter/**'
      - '.github/workflows/web-currency-converter.yml'
  push:
    branches: [develop, main]
    paths:
      - 'Practice.Web.CurrencyConverter/**'
      - '.github/workflows/web-currency-converter.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    working-directory: Practice.Web.CurrencyConverter

jobs:
  # ──────────────────────────────────────────────
  # CI: lint + type-check + build (PRs and pushes)
  # ──────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: Practice.Web.CurrencyConverter/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Type check
        run: yarn type-check

      - name: Build
        # NEXTAUTH_URL and NEXTAUTH_SECRET are required for next build even without runtime auth
        env:
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-placeholder-secret-not-used-in-production
          # Disable telemetry
          NEXT_TELEMETRY_DISABLED: 1
        run: yarn build

      - name: Upload build artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: |
            Practice.Web.CurrencyConverter/.next/
            !Practice.Web.CurrencyConverter/.next/cache
          retention-days: 3
