name: Chatbot · Currency Converter

on:
  pull_request:
    branches: [develop, main]
    paths:
      - 'Practice.Chatbot.CurrencyConverter/**'
      - '.github/workflows/chatbot-currency-converter.yml'
  push:
    branches: [develop, main]
    paths:
      - 'Practice.Chatbot.CurrencyConverter/**'
      - '.github/workflows/chatbot-currency-converter.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  SOLUTION: Practice.Chatbot.CurrencyConverter/Practice.Chatbot.CurrencyConverter.slnx

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} --no-restore -c Release

      - name: Test – Domain
        run: dotnet test Practice.Chatbot.CurrencyConverter/src/Domain/tests --no-build -c Release --logger "trx" --results-directory ./test-results/domain --collect:"XPlat Code Coverage"

      - name: Test – Application
        run: dotnet test Practice.Chatbot.CurrencyConverter/src/Application/tests --no-build -c Release --logger "trx" --results-directory ./test-results/application --collect:"XPlat Code Coverage"

      - name: Test – Infrastructure
        run: dotnet test Practice.Chatbot.CurrencyConverter/src/Infrastructure/tests --no-build -c Release --logger "trx" --results-directory ./test-results/infrastructure --collect:"XPlat Code Coverage"

      - name: Test – WebApi
        run: dotnet test Practice.Chatbot.CurrencyConverter/src/WebApi/tests --no-build -c Release --logger "trx" --results-directory ./test-results/webapi --collect:"XPlat Code Coverage"

      - name: Report test results
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Unit Tests – Chatbot
          path: './test-results/**/*.trx'
          reporter: dotnet-trx
          fail-on-error: true

      - name: Coverage report
        if: always()
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator \
            -reports:"./test-results/**/coverage.cobertura.xml" \
            -targetdir:"./coverage-report" \
            -reporttypes:"MarkdownSummaryGithub"
          cat ./coverage-report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-chatbot
          path: ./test-results/**/*.trx
          retention-days: 7

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      checks: write
      pull-requests: write

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} --no-restore -c Release

      - name: Test – Integration
        env:
          Redis__ConnectionString: localhost:6379
        run: dotnet test Practice.Chatbot.CurrencyConverter/tests/Integration.Tests --no-build -c Release --logger "trx" --results-directory ./test-results/integration --collect:"XPlat Code Coverage"

      - name: Report integration test results
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Integration Tests – Chatbot
          path: './test-results/integration/**/*.trx'
          reporter: dotnet-trx
          fail-on-error: true

      - name: Coverage report
        if: always()
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator \
            -reports:"./test-results/**/coverage.cobertura.xml" \
            -targetdir:"./coverage-report" \
            -reporttypes:"MarkdownSummaryGithub"
          cat ./coverage-report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-chatbot-integration
          path: ./test-results/integration/**/*.trx
          retention-days: 7
