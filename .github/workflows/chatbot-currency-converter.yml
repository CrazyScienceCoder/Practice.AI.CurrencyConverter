name: Chatbot · Currency Converter

on:
  pull_request:
    branches: [develop, main]
    paths:
      - 'Practice.Chatbot.CurrencyConverter/**'
      - '.github/workflows/chatbot-currency-converter.yml'
  push:
    branches: [develop, main]
    paths:
      - 'Practice.Chatbot.CurrencyConverter/**'
      - '.github/workflows/chatbot-currency-converter.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  SOLUTION: Practice.Chatbot.CurrencyConverter/Practice.Chatbot.CurrencyConverter.slnx

jobs:
  # ──────────────────────────────────────────────
  # CI: build + unit tests (PRs and pushes)
  # ──────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} --no-restore -c Release

      - name: Test – Domain
        run: dotnet test Practice.Chatbot.CurrencyConverter/src/Domain/tests --no-build -c Release --logger "github" --results-directory ./test-results/domain

      - name: Test – Application
        run: dotnet test Practice.Chatbot.CurrencyConverter/src/Application/tests --no-build -c Release --logger "github" --results-directory ./test-results/application

      - name: Test – Infrastructure
        run: dotnet test Practice.Chatbot.CurrencyConverter/src/Infrastructure/tests --no-build -c Release --logger "github" --results-directory ./test-results/infrastructure

      - name: Test – WebApi
        run: dotnet test Practice.Chatbot.CurrencyConverter/src/WebApi/tests --no-build -c Release --logger "github" --results-directory ./test-results/webapi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-chatbot
          path: ./test-results/**/*.xml
          retention-days: 7

  # ──────────────────────────────────────────────
  # Integration tests (push to develop / main only)
  # ──────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: build-and-test

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} --no-restore -c Release

      - name: Test – Integration
        env:
          Redis__ConnectionString: localhost:6379
          # Integration tests mock the AI provider — no real API key needed
          AI__Provider: Mock
        run: dotnet test Practice.Chatbot.CurrencyConverter/tests/Integration.Tests --no-build -c Release --logger "github" --results-directory ./test-results/integration

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-chatbot-integration
          path: ./test-results/integration/**/*.xml
          retention-days: 7
