name: Backend · Currency Converter

on:
  pull_request:
    branches: [develop, main]
    paths:
      - 'Practice.Backend.CurrencyConverter/**'
      - '.github/workflows/backend-currency-converter.yml'
  push:
    branches: [develop, main]
    paths:
      - 'Practice.Backend.CurrencyConverter/**'
      - '.github/workflows/backend-currency-converter.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  SOLUTION: Practice.Backend.CurrencyConverter/Practice.Backend.CurrencyConverter.slnx
  MESSAGES_CSPROJ: Practice.Backend.CurrencyConverter/src/Messages/src/Messages.csproj
  CLIENT_CSPROJ: Practice.Backend.CurrencyConverter/src/Client/src/Client.csproj

jobs:
  # ──────────────────────────────────────────────
  # CI: build + unit/integration-free tests (PRs and pushes)
  # ──────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} --no-restore -c Release

      # Run all test projects except Integration.Tests (requires Redis)
      - name: Test – Domain
        run: dotnet test Practice.Backend.CurrencyConverter/src/Domain/tests --no-build -c Release --logger "trx" --results-directory ./test-results/domain --collect:"XPlat Code Coverage"

      - name: Test – Application
        run: dotnet test Practice.Backend.CurrencyConverter/src/Application/tests --no-build -c Release --logger "trx" --results-directory ./test-results/application --collect:"XPlat Code Coverage"

      - name: Test – Infrastructure
        run: dotnet test Practice.Backend.CurrencyConverter/src/Infrastructure/tests --no-build -c Release --logger "trx" --results-directory ./test-results/infrastructure --collect:"XPlat Code Coverage"

      - name: Test – Frankfurter.ApiClient
        run: dotnet test Practice.Backend.CurrencyConverter/src/Frankfurter.ApiClient/tests --no-build -c Release --logger "trx" --results-directory ./test-results/frankfurter --collect:"XPlat Code Coverage"

      - name: Test – Client
        run: dotnet test Practice.Backend.CurrencyConverter/src/Client/tests --no-build -c Release --logger "trx" --results-directory ./test-results/client --collect:"XPlat Code Coverage"

      - name: Test – WebApi
        run: dotnet test Practice.Backend.CurrencyConverter/src/WebApi/tests --no-build -c Release --logger "trx" --results-directory ./test-results/webapi --collect:"XPlat Code Coverage"

      - name: Report test results
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Unit Tests – Backend
          path: './test-results/**/*.trx'
          reporter: dotnet-trx
          fail-on-error: true

      - name: Coverage report
        if: always()
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator \
            -reports:"./test-results/**/coverage.cobertura.xml" \
            -targetdir:"./coverage-report" \
            -reporttypes:"MarkdownSummaryGithub"
          cat ./coverage-report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-backend
          path: ./test-results/**/*.trx
          retention-days: 7

  # ──────────────────────────────────────────────
  # Integration tests (push to develop / main only)
  # ──────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      checks: write
      pull-requests: write

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} --no-restore -c Release

      - name: Test – Integration
        env:
          Redis__ConnectionString: localhost:6379
        run: dotnet test Practice.Backend.CurrencyConverter/tests/Integration.Tests --no-build -c Release --logger "trx" --results-directory ./test-results/integration --collect:"XPlat Code Coverage"

      - name: Report integration test results
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Integration Tests – Backend
          path: './test-results/integration/**/*.trx'
          reporter: dotnet-trx
          fail-on-error: true

      - name: Coverage report
        if: always()
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator \
            -reports:"./test-results/**/coverage.cobertura.xml" \
            -targetdir:"./coverage-report" \
            -reporttypes:"MarkdownSummaryGithub"
          cat ./coverage-report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-backend-integration
          path: ./test-results/integration/**/*.trx
          retention-days: 7

  # ──────────────────────────────────────────────
  # NuGet publish – develop branch → pre-release
  # ──────────────────────────────────────────────
  publish-dev:
    name: Publish NuGet (dev pre-release)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    needs: [build-and-test, integration-tests]
    environment: nuget-dev

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Determine version
        id: version
        run: |
          MAJOR_MINOR=$(grep -oP '(?<=<Version>)\d+\.\d+' ${{ env.CLIENT_CSPROJ }} | head -1)
          FULL="${MAJOR_MINOR}.${{ github.run_number }}-dev"
          echo "version=${FULL}" >> "$GITHUB_OUTPUT"
          echo "Publishing pre-release version: ${FULL}"

      - name: Set version in csproj
        run: |
          sed -i "s|<Version>.*</Version>|<Version>${{ steps.version.outputs.version }}</Version>|" ${{ env.MESSAGES_CSPROJ }}
          sed -i "s|<Version>.*</Version>|<Version>${{ steps.version.outputs.version }}</Version>|" ${{ env.CLIENT_CSPROJ }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Pack
        run: |
          dotnet pack ${{ env.MESSAGES_CSPROJ }} --no-restore -c Release --output ./nupkgs
          dotnet pack ${{ env.CLIENT_CSPROJ }}   --no-restore -c Release --output ./nupkgs

      - name: Push to NuGet
        run: |
          dotnet nuget push ./nupkgs/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  # ──────────────────────────────────────────────
  # NuGet publish – main branch → stable release
  # ──────────────────────────────────────────────
  publish-release:
    name: Publish NuGet (stable release)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-and-test, integration-tests]
    environment: nuget-prod
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Determine version
        id: version
        run: |
          MAJOR_MINOR=$(grep -oP '(?<=<Version>)\d+\.\d+' ${{ env.CLIENT_CSPROJ }} | head -1)
          FULL="${MAJOR_MINOR}.${{ github.run_number }}"
          echo "version=${FULL}" >> "$GITHUB_OUTPUT"
          echo "Publishing stable version: ${FULL}"

      - name: Set version in csproj
        run: |
          sed -i "s|<Version>.*</Version>|<Version>${{ steps.version.outputs.version }}</Version>|" ${{ env.MESSAGES_CSPROJ }}
          sed -i "s|<Version>.*</Version>|<Version>${{ steps.version.outputs.version }}</Version>|" ${{ env.CLIENT_CSPROJ }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Pack
        run: |
          dotnet pack ${{ env.MESSAGES_CSPROJ }} --no-restore -c Release --output ./nupkgs
          dotnet pack ${{ env.CLIENT_CSPROJ }}   --no-restore -c Release --output ./nupkgs

      - name: Push to NuGet
        run: |
          dotnet nuget push ./nupkgs/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: client/v${{ steps.version.outputs.version }}
          name: "Client v${{ steps.version.outputs.version }}"
          generate_release_notes: true
          files: ./nupkgs/*.nupkg
