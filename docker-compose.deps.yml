services:
    opensearch:
        image: opensearchproject/opensearch:3.3.2
        container_name: opensearch
        environment:
            discovery.type: single-node
            OPENSEARCH_INITIAL_ADMIN_PASSWORD: StrongPassword123!
            OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
            plugins.security.disabled: true
        ports:
            - "9200:9200"
            - "9600:9600"
        volumes:
            - opensearch-data:/usr/share/opensearch/data

    opensearch-dashboards:
        image: opensearchproject/opensearch-dashboards:3.3.0
        container_name: opensearch-dashboards
        ports:
            - "5601:5601"
        environment:
            - OPENSEARCH_HOSTS=http://opensearch:9200
            - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
        depends_on:
            - opensearch

    jaeger:
        image: jaegertracing/all-in-one:1.76.0
        ports:
            - "16686:16686"

    prometheus:
        image: prom/prometheus
        volumes:
            - ./Practice.Backend.CurrencyConverter/instrumentation/prometheus.yml:/etc/prometheus/prometheus.yml
        ports:
            - "9090:9090"
        command:
            - '--config.file=/etc/prometheus/prometheus.yml'

    grafana:
        image: grafana/grafana:latest
        ports:
            - "3001:3000"
        environment:
            GF_AUTH_ANONYMOUS_ENABLED: "true"
            GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
            GF_AUTH_DISABLE_LOGIN_FORM: "true"
        volumes:
            - grafana-data:/var/lib/grafana
            - ./Practice.Backend.CurrencyConverter/instrumentation/grafana/provisioning:/etc/grafana/provisioning
            - ./Practice.Backend.CurrencyConverter/instrumentation/grafana/dashboards:/var/lib/grafana/dashboards
        depends_on:
            - prometheus

    otel-collector:
        image: otel/opentelemetry-collector-contrib:0.103.0
        volumes:
            - ./Practice.Backend.CurrencyConverter/instrumentation/otel-collector.yaml:/etc/otel/config.yaml
            - ./Practice.Backend.CurrencyConverter/log:/log/otel
        command: --config /etc/otel/config.yaml
        environment:
            JAEGER_ENDPOINT: "jaeger:4317"
        ports:
            - "8889:8889"
            - "4317:4317"
        depends_on:
            - jaeger
            - prometheus

    redis:
        image: redis:latest
        container_name: redis
        restart: always
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data

    keycloak-postgres:
        image: postgres:16-alpine
        container_name: keycloak-postgres
        restart: unless-stopped
        environment:
            POSTGRES_DB: keycloak
            POSTGRES_USER: keycloak
            POSTGRES_PASSWORD: keycloak_password
        volumes:
            - keycloak_postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U keycloak"]
            interval: 10s
            timeout: 5s
            retries: 5

    keycloak:
        image: quay.io/keycloak/keycloak:25.0
        container_name: keycloak
        restart: unless-stopped
        command: start-dev --import-realm
        environment:
            KC_DB: postgres
            KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
            KC_DB_USERNAME: keycloak
            KC_DB_PASSWORD: keycloak_password
            KEYCLOAK_ADMIN: admin
            KEYCLOAK_ADMIN_PASSWORD: admin
            KC_HTTP_PORT: 8080
            KC_HOSTNAME_STRICT: "false"
            KC_HOSTNAME_STRICT_HTTPS: "false"
            KC_HTTP_ENABLED: "true"
        ports:
            - "8900:8080"
        volumes:
            - ./keycloak:/opt/keycloak/data/import
        depends_on:
            keycloak-postgres:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
            interval: 30s
            timeout: 10s
            retries: 10
            start_period: 60s

volumes:
    opensearch-data:
    grafana-data:
    redis_data:
    keycloak_postgres_data:
